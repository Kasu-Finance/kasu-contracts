[profile.default]
solc = "0.8.23"
src = "src"
out = "out"
libs = ["lib", "vendor"]

# optimizer
optimizer = true
optimizer_runs = 200
# via_ir shrinks PendingPool below EIP-170 after the FV-01 fix added the budget-tracking
# code; keep enabled so CI and local stay in sync.
via_ir = true

# CI profile: only compile production contracts when running the size check. Test harnesses
# (e.g. PendingPoolHarness) extend production contracts with extra helpers and naturally grow
# above EIP-170 — they never deploy, so the size limit doesn't apply to them.
[profile.ci]
test = "no_such_dir_to_skip_tests"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
